name: calculator
version: '1.0.0'
description: 'A simple calculator tool for testing'

parameters:
  operation:
    type: string
    description: 'The mathematical operation to perform'
    enum: [add, subtract, multiply, divide]
    required: true
  a:
    type: number
    description: 'First number'
    required: true
  b:
    type: number
    description: 'Second number'
    required: true

execution:
  type: command
  command: 'node'
  args:
    [
      '-e',
      "console.log(JSON.stringify({result: (() => { const op = process.argv[2]; const a = parseFloat(process.argv[3]); const b = parseFloat(process.argv[4]); switch(op) { case 'add': return a + b; case 'subtract': return a - b; case 'multiply': return a * b; case 'divide': return a / b; default: throw new Error('Invalid operation'); } })()}))",
      '{operation}',
      '{a}',
      '{b}',
    ]

output_schema:
  type: object
  properties:
    result:
      type: number

tags: [math, calculator, test]
