name: github-merge-pull-request
description: Merge a pull request into the base branch
version: '1.0.0'
requires_approval: true

parameters:
  owner:
    type: string
    required: true
    description: Repository owner username or organization
  repo:
    type: string
    required: true
    description: Repository name
  pull_number:
    type: number
    required: true
    description: Pull request number
  commit_title:
    type: string
    required: false
    description: Custom commit title
  commit_message:
    type: string
    required: false
    description: Custom commit message
  merge_method:
    type: string
    required: false
    description: Merge method - merge, squash, or rebase
    default: merge
  sha:
    type: string
    required: false
    description: Expected SHA of the PR head commit (for safety check)

execution:
  type: http
  method: PUT
  url: 'https://api.github.com/repos/{owner}/{repo}/pulls/{pull_number}/merge'
  headers:
    Accept: application/vnd.github+json
    Authorization: 'Bearer {GITHUB_TOKEN}'
    X-GitHub-Api-Version: '2022-11-28'
    Content-Type: application/json
  body:
    commit_title: '{commit_title}'
    commit_message: '{commit_message}'
    merge_method: '{merge_method}'
    sha: '{sha}'
  timeout: 15000

authentication:
  type: bearer
  location: header
  notes:
    env: GITHUB_TOKEN
    required: true
    permission: Pull requests write

output_schema:
  type: object
  properties:
    sha:
      type: string
      description: Merge commit SHA
    merged:
      type: boolean
    message:
      type: string

error_handling:
  retry: 1
  backoff_type: exponential
  initial_delay_ms: 1000

examples:
  - name: Merge pull request
    params:
      owner: myorg
      repo: myrepo
      pull_number: 42
  - name: Squash merge
    params:
      owner: myorg
      repo: myrepo
      pull_number: 42
      merge_method: squash
