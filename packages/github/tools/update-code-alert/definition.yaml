name: github-update-code-alert
description: Update the status of a code scanning security alert
version: '1.0.0'
requires_approval: true

parameters:
  owner:
    type: string
    required: true
    description: Repository owner username or organization
  repo:
    type: string
    required: true
    description: Repository name
  alert_number:
    type: number
    required: true
    description: Alert number
  state:
    type: string
    required: true
    description: New state - open, dismissed, or fixed
  dismissed_reason:
    type: string
    required: false
    description: If dismissing, the reason - false positive, won't fix, used in tests, etc.
  dismissed_comment:
    type: string
    required: false
    description: Optional comment when dismissing

execution:
  type: http
  method: PATCH
  url: 'https://api.github.com/repos/{owner}/{repo}/code-scanning/alerts/{alert_number}'
  headers:
    Accept: application/vnd.github+json
    Authorization: 'Bearer {GITHUB_TOKEN}'
    X-GitHub-Api-Version: '2022-11-28'
    Content-Type: application/json
  body:
    state: '{state}'
    dismissed_reason: '{dismissed_reason}'
    dismissed_comment: '{dismissed_comment}'
  timeout: 15000

authentication:
  type: bearer
  location: header
  notes:
    env: GITHUB_TOKEN
    required: true
    permission: Security events write
    note: Requires GitHub Advanced Security enabled

output_schema:
  type: object
  properties:
    number:
      type: number
    state:
      type: string
    dismissed_at:
      type: string
    dismissed_reason:
      type: string

error_handling:
  retry: 1
  backoff_type: exponential
  initial_delay_ms: 1000

examples:
  - name: Dismiss false positive
    params:
      owner: myorg
      repo: myrepo
      alert_number: 42
      state: dismissed
      dismissed_reason: false positive
  - name: Reopen alert
    params:
      owner: myorg
      repo: myrepo
      alert_number: 42
      state: open
