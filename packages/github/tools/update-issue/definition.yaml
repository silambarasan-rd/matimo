name: github-update-issue
description: Update an issue - title, body, state, assignees, labels
version: '1.0.0'
requires_approval: true

parameters:
  owner:
    type: string
    required: true
    description: Repository owner username or organization
  repo:
    type: string
    required: true
    description: Repository name
  issue_number:
    type: number
    required: true
    description: Issue number
  title:
    type: string
    required: false
    description: New issue title
  body:
    type: string
    required: false
    description: New issue body
  state:
    type: string
    required: false
    description: New state - open or closed
  assignees:
    type: array
    required: false
    description: Array of usernames to assign
  labels:
    type: array
    required: false
    description: Array of label names

execution:
  type: http
  method: PATCH
  url: 'https://api.github.com/repos/{owner}/{repo}/issues/{issue_number}'
  headers:
    Accept: application/vnd.github+json
    Authorization: 'Bearer {GITHUB_TOKEN}'
    X-GitHub-Api-Version: '2022-11-28'
    Content-Type: application/json
  body:
    title: '{title}'
    body: '{body}'
    state: '{state}'
    assignees: '{assignees}'
    labels: '{labels}'
  timeout: 15000

authentication:
  type: bearer
  location: header
  notes:
    env: GITHUB_TOKEN
    required: true
    permission: Issues write

output_schema:
  type: object
  properties:
    id:
      type: number
    number:
      type: number
    title:
      type: string
    state:
      type: string
    updated_at:
      type: string

error_handling:
  retry: 1
  backoff_type: exponential
  initial_delay_ms: 1000

examples:
  - name: Close an issue
    params:
      owner: myorg
      repo: myrepo
      issue_number: 42
      state: closed
  - name: Update issue labels
    params:
      owner: myorg
      repo: myrepo
      issue_number: 42
      labels:
        - fixed
        - closed
