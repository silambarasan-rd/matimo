name: github-list-issues
description: List issues in a repository with filtering and sorting options
version: '1.0.0'

parameters:
  owner:
    type: string
    required: true
    description: Repository owner username or organization
  repo:
    type: string
    required: true
    description: Repository name
  state:
    type: string
    required: false
    description: Filter by state - open, closed, or all
    default: open
  assignee:
    type: string
    required: false
    description: Filter by assignee username or 'none' for unassigned
  labels:
    type: string
    required: false
    description: Comma-separated label names
  sort:
    type: string
    required: false
    description: Sort by - created, updated, or comments
    default: created
  direction:
    type: string
    required: false
    description: Sort direction - asc or desc
    default: desc
  per_page:
    type: number
    required: false
    description: Results per page (max 100)
    default: 30
  page:
    type: number
    required: false
    description: Page number for pagination
    default: 1

execution:
  type: http
  method: GET
  url: 'https://api.github.com/repos/{owner}/{repo}/issues'
  query_params:
    state: '{state}'
    assignee: '{assignee}'
    labels: '{labels}'
    sort: '{sort}'
    direction: '{direction}'
    per_page: '{per_page}'
    page: '{page}'
  headers:
    Accept: application/vnd.github+json
    Authorization: 'Bearer {GITHUB_TOKEN}'
    X-GitHub-Api-Version: '2022-11-28'
  timeout: 15000

authentication:
  type: bearer
  location: header
  notes:
    env: GITHUB_TOKEN
    scope: Public repos don't require authentication
    public: Can query without token

output_schema:
  type: array
  items:
    type: object
    description: Issue object

error_handling:
  retry: 2
  backoff_type: exponential
  initial_delay_ms: 1000

examples:
  - name: List open issues
    params:
      owner: kubernetes
      repo: kubernetes
      state: open
  - name: List issues assigned to user
    params:
      owner: nodejs
      repo: node
      assignee: username
      sort: updated
