name: github-search-users
description: Search for GitHub users by name, location, or follower count
version: '1.0.0'

parameters:
  query:
    type: string
    required: true
    description: Search query (e.g., 'location:San Francisco followers:>5000')
  sort:
    type: string
    required: false
    description: Sort field - followers, repositories, or joined
    default: followers
  order:
    type: string
    required: false
    description: Sort order - asc or desc
    default: desc
  per_page:
    type: number
    required: false
    description: Results per page (max 100)
    default: 30
  page:
    type: number
    required: false
    description: Page number for pagination
    default: 1

execution:
  type: http
  method: GET
  url: 'https://api.github.com/search/users'
  query_params:
    q: '{query}'
    sort: '{sort}'
    order: '{order}'
    per_page: '{per_page}'
    page: '{page}'
  headers:
    Accept: application/vnd.github+json
    Authorization: 'Bearer {GITHUB_TOKEN}'
    X-GitHub-Api-Version: '2022-11-28'
  timeout: 30000

authentication:
  type: bearer
  location: header
  notes:
    env: GITHUB_TOKEN
    optional: Can be called without authentication (public users only)
    rate_limit: 30 req/min authenticated

output_schema:
  type: object
  properties:
    total_count:
      type: number
    items:
      type: array
      description: Array of user objects

error_handling:
  retry: 2
  backoff_type: exponential
  initial_delay_ms: 1000

examples:
  - name: Find developers in San Francisco
    params:
      query: 'location:"San Francisco" followers:>100'
  - name: Find contributors to TypeScript
    params:
      query: 'org:microsoft followers:>50'
