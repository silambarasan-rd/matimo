name: github-list-commits
description: List commits in a repository
version: '1.0.0'

parameters:
  owner:
    type: string
    required: true
    description: Repository owner username or organization
  repo:
    type: string
    required: true
    description: Repository name
  sha:
    type: string
    required: false
    description: SHA or branch name (default is main/master)
  path:
    type: string
    required: false
    description: Only commits modifying this path
  author:
    type: string
    required: false
    description: Filter by commit author (login or email)
  per_page:
    type: number
    required: false
    description: Results per page (max 100)
    default: 30
  page:
    type: number
    required: false
    description: Page number for pagination
    default: 1

execution:
  type: http
  method: GET
  url: 'https://api.github.com/repos/{owner}/{repo}/commits'
  query_params:
    sha: '{sha}'
    path: '{path}'
    author: '{author}'
    per_page: '{per_page}'
    page: '{page}'
  headers:
    Accept: application/vnd.github+json
    Authorization: 'Bearer {GITHUB_TOKEN}'
    X-GitHub-Api-Version: '2022-11-28'
  timeout: 15000

authentication:
  type: bearer
  location: header
  notes:
    env: GITHUB_TOKEN
    optional: Public repos don't require authentication

output_schema:
  type: array
  items:
    type: object
    description: Commit object

error_handling:
  retry: 2
  backoff_type: exponential
  initial_delay_ms: 1000

examples:
  - name: List recent commits
    params:
      owner: kubernetes
      repo: kubernetes
      sha: main
  - name: Commits by author
    params:
      owner: nodejs
      repo: node
      author: torvalds@linux-foundation.org
