name: github-list-collaborators
description: List collaborators on a repository
version: '1.0.0'

parameters:
  owner:
    type: string
    required: true
    description: Repository owner username or organization
  repo:
    type: string
    required: true
    description: Repository name
  affiliation:
    type: string
    required: false
    description: Filter by affiliation - all, outside, or direct
    default: all
  permission:
    type: string
    required: false
    description: Filter by permission - pull, triage, push, maintain, or admin
  per_page:
    type: number
    required: false
    description: Results per page (max 100)
    default: 30
  page:
    type: number
    required: false
    description: Page number for pagination
    default: 1

execution:
  type: http
  method: GET
  url: 'https://api.github.com/repos/{owner}/{repo}/collaborators?affiliation={affiliation}&permission={permission}&per_page={per_page}&page={page}'
  headers:
    Accept: application/vnd.github+json
    Authorization: 'Bearer {GITHUB_TOKEN}'
    X-GitHub-Api-Version: '2022-11-28'
  timeout: 15000

authentication:
  type: bearer
  location: header
  notes:
    env: GITHUB_TOKEN
    required: true
    permission: Repository metadata read

output_schema:
  type: array
  items:
    type: object
    description: Collaborator object with permissions

error_handling:
  retry: 2
  backoff_type: exponential
  initial_delay_ms: 1000

examples:
  - name: List all collaborators
    params:
      owner: myorg
      repo: myrepo
  - name: List admin collaborators
    params:
      owner: myorg
      repo: myrepo
      permission: admin
