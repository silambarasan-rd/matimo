name: hubspot-get-lead
version: '1.0.0'
description: Retrieve a specific lead by ID from HubSpot CRM.

parameters:
  id:
    type: string
    required: true
    description: The HubSpot lead ID to retrieve.
  properties:
    type: array
    required: false
    description: Array of property names to retrieve (e.g., ['email', 'firstname', 'lastname']).

execution:
  type: http
  method: GET
  url: 'https://api.hubapi.com/crm/v3/objects/leads/{id}'
  headers:
    Authorization: 'Bearer {MATIMO_HUBSPOT_API_KEY}'
  query_params:
    properties: '{properties}'
  parameter_encoding:
    - source: [properties]
      target: body
      encoding: json
  timeout: 30000

authentication:
  type: bearer
  location: header
  name: Authorization

output_schema:
  type: object
  properties:
    id:
      type: string
    properties:
      type: object
  required:
    - id

error_handling:
  retry: 2
  backoff_type: exponential
  initial_delay_ms: 500

requires_approval: false

examples:
  - name: Get a lead by ID
    params:
      id: "12345"
      properties:
        - email
        - firstname
        - lastname
    expected_result: Lead object with ID 12345 and specified properties
