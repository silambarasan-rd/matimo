name: hubspot-get-order
version: '1.0.0'
description: Retrieve a specific order by ID from HubSpot CRM.

parameters:
  id:
    type: string
    required: true
    description: The HubSpot order ID.
  properties:
    type: array
    required: false
    description: Array of property names to retrieve.

execution:
  type: http
  method: GET
  url: 'https://api.hubapi.com/crm/v3/objects/orders/{id}'
  headers:
    Authorization: 'Bearer {MATIMO_HUBSPOT_API_KEY}'
  query_params:
    properties: '{properties}'
  parameter_encoding:
    - source: [properties]
      target: body
      encoding: json
  timeout: 30000

authentication:
  type: bearer
  location: header
  name: Authorization

output_schema:
  type: object
  properties:
    id:
      type: string
    properties:
      type: object

error_handling:
  retry: 2
  backoff_type: exponential
  initial_delay_ms: 500

requires_approval: false

examples:
  - name: Get an order
    params:
      id: "12345"
    expected_result: Order with ID 12345
