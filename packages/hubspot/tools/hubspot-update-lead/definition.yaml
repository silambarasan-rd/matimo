name: hubspot-update-lead
version: '1.0.0'
description: Update a lead in HubSpot CRM.

parameters:
  id:
    type: string
    required: true
    description: The HubSpot lead ID to update.
  properties:
    type: object
    required: true
    description: Object containing lead properties to update.

execution:
  type: http
  method: PATCH
  url: 'https://api.hubapi.com/crm/v3/objects/leads/{id}'
  headers:
    Authorization: 'Bearer {MATIMO_HUBSPOT_API_KEY}'
    Content-Type: application/json
  body:
    properties: '{properties}'
  parameter_encoding:
    - source: [properties]
      target: body
      encoding: json
  timeout: 30000

authentication:
  type: bearer
  location: header
  name: Authorization

output_schema:
  type: object
  properties:
    id:
      type: string
    properties:
      type: object
  required:
    - id

error_handling:
  retry: 2
  backoff_type: exponential
  initial_delay_ms: 500

requires_approval: true

examples:
  - name: Update a lead
    params:
      id: "12345"
      properties:
        firstname: Jane
        lastname: Smith
    expected_result: Lead updated with new firstname and lastname
