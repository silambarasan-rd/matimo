name: hubspot-create-order
version: '1.0.0'
description: Create a new order in HubSpot CRM.

parameters:
  ordernumber:
    type: string
    required: false
    description: Order number
  amount:
    type: number
    required: false
    description: Order amount
  orderdate:
    type: string
    required: false
    description: Order date in ISO format
  status:
    type: string
    required: false
    description: Order status

execution:
  type: http
  method: POST
  url: 'https://api.hubapi.com/crm/v3/objects/orders'
  headers:
    Authorization: 'Bearer {MATIMO_HUBSPOT_API_KEY}'
    Content-Type: application/json
  body:
    properties:
      ordernumber: '{ordernumber}'
      amount: '{amount}'
      orderdate: '{orderdate}'
      status: '{status}'
  timeout: 30000

authentication:
  type: bearer
  location: header
  name: Authorization

output_schema:
  type: object
  properties:
    id:
      type: string
    properties:
      type: object

error_handling:
  retry: 2
  backoff_type: exponential
  initial_delay_ms: 500

requires_approval: false

examples:
  - name: Create an order
    params:
      properties:
        hs_order_amount: 1000
    expected_result: Order created
