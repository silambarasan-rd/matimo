name: hubspot-create-product
version: '1.0.0'
description: Create a new product in HubSpot CRM.

parameters:
  name:
    type: string
    required: true
    description: Product name
  description:
    type: string
    required: false
    description: Product description
  price:
    type: number
    required: false
    description: Product price

execution:
  type: http
  method: POST
  url: 'https://api.hubapi.com/crm/v3/objects/products'
  headers:
    Authorization: 'Bearer {MATIMO_HUBSPOT_API_KEY}'
    Content-Type: application/json
  body:
    properties:
      name: '{name}'
      description: '{description}'
      price: '{price}'
  timeout: 30000

authentication:
  type: bearer
  location: header
  name: Authorization

output_schema:
  type: object
  properties:
    id:
      type: string
    properties:
      type: object

error_handling:
  retry: 2
  backoff_type: exponential
  initial_delay_ms: 500

requires_approval: false

examples:
  - name: Create a product
    params:
      properties:
        name: Product A
        price: 99.99
        sku: SKU-001
    expected_result: Product created
