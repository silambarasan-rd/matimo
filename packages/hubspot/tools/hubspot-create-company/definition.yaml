name: hubspot-create-company
version: '1.0.0'
description: Create a new company in HubSpot CRM.

parameters:
  name:
    type: string
    required: true
    description: Company name
  domain:
    type: string
    required: false
    description: Company domain

execution:
  type: http
  method: POST
  url: 'https://api.hubapi.com/crm/v3/objects/companies'
  headers:
    Authorization: 'Bearer {MATIMO_HUBSPOT_API_KEY}'
    Content-Type: application/json
  body:
    properties:
      name: '{name}'
      domain: '{domain}'
  timeout: 30000

authentication:
  type: bearer
  location: header
  name: Authorization
  notes:
    env: MATIMO_HUBSPOT_API_KEY

output_schema:
  type: object
  properties:
    id: { type: string }
    properties: { type: object }
    createdAt: { type: string }
  required: [id, properties]

error_handling:
  retry: 2
  backoff_type: exponential
  initial_delay_ms: 500

examples:
  - name: 'Create company with name'
    params:
      name: 'Acme Corp'
    expected_result: 'Company created with id and properties.'
  - name: 'Create company with name and domain'
    params:
      name: 'Tech Startup Inc'
      domain: 'techstartup.com'
    expected_result: 'Company created with name and domain.'
