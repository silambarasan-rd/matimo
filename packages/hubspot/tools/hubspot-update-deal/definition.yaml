name: hubspot-update-deal
version: '1.0.0'
description: Update an existing deal in HubSpot CRM.

parameters:
  id:
    type: string
    required: true
    description: The HubSpot deal ID to update.
  properties:
    type: object
    required: true
    description: Object containing deal properties to update.

execution:
  type: http
  method: PATCH
  url: 'https://api.hubapi.com/crm/v3/objects/deals/{id}'
  headers:
    Authorization: 'Bearer {MATIMO_HUBSPOT_API_KEY}'
    Content-Type: application/json
  body:
    properties: '{properties}'
  parameter_encoding:
    - source: [properties]
      target: body
      encoding: json
  timeout: 30000

authentication:
  type: bearer
  location: header
  name: Authorization
  notes:
    env: MATIMO_HUBSPOT_API_KEY

requires_approval: true

output_schema:
  type: object
  properties:
    id: { type: string }
    properties: { type: object }
    updatedAt: { type: string }
  required: [id, properties]

error_handling:
  retry: 2
  backoff_type: exponential
  initial_delay_ms: 500

examples:
  - name: 'Update deal stage'
    params:
      id: '789'
      properties:
        dealstage: 'closedwon'
    expected_result: 'Updated deal with new stage.'
