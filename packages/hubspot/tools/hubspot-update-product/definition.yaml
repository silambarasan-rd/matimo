name: hubspot-update-product
version: '1.0.0'
description: Update a product in HubSpot CRM.

parameters:
  id:
    type: string
    required: true
    description: The HubSpot product ID.
  properties:
    type: object
    required: true
    description: Object containing properties to update.

execution:
  type: http
  method: PATCH
  url: 'https://api.hubapi.com/crm/v3/objects/products/{id}'
  headers:
    Authorization: 'Bearer {MATIMO_HUBSPOT_API_KEY}'
    Content-Type: application/json
  body:
    properties: '{properties}'
  parameter_encoding:
    - source: [properties]
      target: body
      encoding: json
  timeout: 30000

authentication:
  type: bearer
  location: header
  name: Authorization

output_schema:
  type: object
  properties:
    id:
      type: string
    properties:
      type: object

error_handling:
  retry: 2
  backoff_type: exponential
  initial_delay_ms: 500

requires_approval: true

examples:
  - name: Update a product
    params:
      id: "12345"
      properties:
        price: 129.99
    expected_result: Product updated
