name: hubspot-create-invoice
version: '1.0.0'
description: Create a new invoice in HubSpot CRM.

parameters:
  hs_currency:
    type: string
    required: false
    description: Currency code (e.g., USD, EUR, GBP)

execution:
  type: http
  method: POST
  url: 'https://api.hubapi.com/crm/v3/objects/invoices'
  headers:
    Authorization: 'Bearer {MATIMO_HUBSPOT_API_KEY}'
    Content-Type: application/json
  body:
    properties:
      hs_currency: '{hs_currency}'
  timeout: 30000

authentication:
  type: bearer
  location: header
  name: Authorization

output_schema:
  type: object
  properties:
    id:
      type: string
    properties:
      type: object

error_handling:
  retry: 2
  backoff_type: exponential
  initial_delay_ms: 500

requires_approval: false

examples:
  - name: Create an invoice
    params:
      hs_currency: USD
    expected_result: Invoice created with id and properties.
