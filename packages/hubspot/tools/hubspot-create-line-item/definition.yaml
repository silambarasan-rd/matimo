name: hubspot-create-line-item
version: '1.0.0'
description: Create a new line item in HubSpot CRM.

parameters:
  name:
    type: string
    required: false
    description: Line item name
  quantity:
    type: number
    required: false
    description: Quantity
  price:
    type: number
    required: false
    description: Price per unit
  description:
    type: string
    required: false
    description: Line item description

execution:
  type: http
  method: POST
  url: 'https://api.hubapi.com/crm/v3/objects/line_items'
  headers:
    Authorization: 'Bearer {MATIMO_HUBSPOT_API_KEY}'
    Content-Type: application/json
  body:
    properties:
      name: '{name}'
      quantity: '{quantity}'
      price: '{price}'
      description: '{description}'
  timeout: 30000

authentication:
  type: bearer
  location: header
  name: Authorization

output_schema:
  type: object
  properties:
    id:
      type: string
    properties:
      type: object

error_handling:
  retry: 2
  backoff_type: exponential
  initial_delay_ms: 500

requires_approval: false

examples:
  - name: Create a line item
    params:
      name: Product A
      quantity: 10
      price: 99.99
    expected_result: Line item created with id and properties.
