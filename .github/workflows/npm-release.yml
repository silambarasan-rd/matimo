name: Release to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Publish to npm
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          body: |
            See the [changelog](https://github.com/tallclub/matimo/blob/main/docs/RELEASES.md) for detailed release notes.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

      - name: Notify Discord
        if: success()
        run: |
          # Extract release notes from RELEASES.md for the current version
          VERSION="${{ github.ref_name }}"
          RELEASE_NOTES=$(awk "
            /^## $VERSION/ {
              found=1
              next
            }
            found && /^## / {
              exit
            }
            found && NF {
              print \$0
            }
          " docs/RELEASES.md | head -20 | sed 's/^//' | tr '\n' ' ')
          
          # Truncate if too long for Discord (2048 char limit for field value)
          if [ ${#RELEASE_NOTES} -gt 1900 ]; then
            RELEASE_NOTES="${RELEASE_NOTES:0:1897}..."
          fi
          
          curl -X POST \
            -H 'Content-Type: application/json' \
            -d "{
              \"username\": \"Matimo Release Bot\",
              \"content\": \"🎉 **New Release Available!**\",
              \"embeds\": [
                {
                  \"title\": \"v${{ github.ref_name }}\",
                  \"description\": \"Matimo has been released on npm!\",
                  \"url\": \"https://github.com/tallclub/matimo/releases/tag/${{ github.ref_name }}\",
                  \"color\": 5814783,
                  \"fields\": [
                    {
                      \"name\": \"📝 Release Notes\",
                      \"value\": \"$RELEASE_NOTES\",
                      \"inline\": false
                    },
                    {
                      \"name\": \"📦 npm Packages\",
                      \"value\": \"\`@matimo/core\` \`@matimo/cli\` \`@matimo/slack\` \`@matimo/gmail\` \`@matimo/postgres\`\",
                      \"inline\": false
                    },
                    {
                      \"name\": \"🔗 Links\",
                      \"value\": \"[GitHub Release](https://github.com/tallclub/matimo/releases/tag/${{ github.ref_name }}) • [Full Changelog](https://github.com/tallclub/matimo/blob/main/docs/RELEASES.md) • [npm Registry](https://www.npmjs.com/org/matimo)\",
                      \"inline\": false
                    }
                  ],
                  \"footer\": {
                    \"text\": \"Matimo v${{ github.ref_name }} • Released on $(date '+%Y-%m-%d')\",
                    \"icon_url\": \"https://github.com/tallclub.png\"
                  }
                }
              ]
            }" \
            '${{ secrets.DISCORD_WEBHOOK }}'
