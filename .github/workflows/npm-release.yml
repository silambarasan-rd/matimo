name: Release to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Publish to npm
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          body: |
            See the [changelog](https://github.com/tallclub/matimo/blob/main/docs/RELEASES.md) for detailed release notes.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

  notify:
    needs: publish
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Notify Discord
        run: |
          set -o pipefail
          VERSION="${{ github.ref_name }}"
          RELEASE_DATE=$(date '+%Y-%m-%d')

          # Extract a short release preview from RELEASES.md for the current version (first 20 lines)
          RELEASE_NOTES=$(awk "
            /^## $VERSION/ {
              found=1
              next
            }
            found && /^## / {
              exit
            }
            found {
              print \$0
            }
          " docs/RELEASES.md | head -40 | sed 's/^//')

          # Dynamically extract publishable packages from pnpm-workspace.yaml
          PACKAGES=$(grep -A 100 "^packages:" pnpm-workspace.yaml | grep '  - "' | sed 's/.*"\(.*\)".*/\1/' | while read dir; do
            if [ -f "$dir/package.json" ]; then
              NAME=$(jq -r '.name' "$dir/package.json")
              PRIVATE=$(jq -r '.private // false' "$dir/package.json")
              if [ "$PRIVATE" = "false" ]; then
                echo "\`$NAME\`"
              fi
            fi
          done | tr '\n' ' ')

          # Ensure webhook secret is present
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK secret is not set; skipping Discord notification."
            exit 0
          fi

          # Build a simple plain-text payload with a short preview and a link to the release
          RELEASE_LINK="https://github.com/tallclub/matimo/releases/tag/$VERSION"

          CONTENT="🎉 New release v$VERSION — $RELEASE_DATE\n\nRelease: $RELEASE_LINK\n\nPreview:\n$RELEASE_NOTES\n\nPublished packages: $PACKAGES"

          PAYLOAD=$(jq -n --arg username "Matimo Release Bot" --arg content "$CONTENT" '{ username: $username, content: $content }')

          # Send to Discord with retries on 429, capture response
          TMP_RESPONSE=$(mktemp)
          attempts=0
          max_attempts=3
          HTTP_CODE=0

          while :; do
            HTTP_CODE=$(curl -sS -o "$TMP_RESPONSE" -w "%{http_code}" -X POST \
              -H 'Content-Type: application/json' \
              -d "$PAYLOAD" "$DISCORD_WEBHOOK") || true

            echo "Discord HTTP status: $HTTP_CODE"

            # Success
            if [ "$HTTP_CODE" -eq 204 ] || [ "$HTTP_CODE" -eq 200 ]; then
              rm -f "$TMP_RESPONSE"
              break
            fi

            # Rate limited: retry with exponential backoff
            if [ "$HTTP_CODE" -eq 429 ] && [ $attempts -lt $max_attempts ]; then
              backoff=$(( (2 ** attempts) * 5 ))
              echo "Rate limited by Discord, retrying after ${backoff}s (attempt $((attempts+1)))"
              sleep $backoff
              attempts=$((attempts+1))
              continue
            fi

            # Non-recoverable error - print response for debugging
            echo "Discord response (first 400 chars):" >&2
            sed -n '1,400p' "$TMP_RESPONSE" >&2 || true
            rm -f "$TMP_RESPONSE"
            exit 1
          done

            echo "Fallback failed; response:" >&2
            sed -n '1,400p' "$TMP_RESPONSE" >&2 || true
            rm -f "$TMP_RESPONSE"
            exit 1
          done
