name: slack_add_reaction
description: |-
  Add an emoji reaction to a message or file.
  Uses reactions.add API method.
version: '1.0.0'
parameters:
  name:
    type: string
    required: true
    description: |-
      Emoji name without colons.
      Examples: thumbsup, heart, rocket, thinking_face
  channel:
    type: string
    required: true
    description: Channel ID containing the message
  timestamp:
    type: string
    required: true
    description: |-
      Message timestamp (ts value).
      Format: Unix timestamp with decimal precision
execution:
  type: http
  method: POST
  url: 'https://slack.com/api/reactions.add'
  headers:
    Authorization: 'Bearer {SLACK_BOT_TOKEN}'
    Content-Type: application/json
  body:
    name: '{name}'
    channel: '{channel}'
    timestamp: '{timestamp}'
  timeout: 10000
authentication:
  type: api_key
  location: header
  name: Authorization
notes:
  env: SLACK_BOT_TOKEN
  scopes: reactions:write
  important: |-
    - Emoji name must be valid and enabled in workspace
    - Works on messages and file reactions
    - Cannot add same reaction twice
