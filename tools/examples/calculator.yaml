name: calculator
version: "1.0.0"
description: "Perform basic arithmetic operations"

parameters:
  operation:
    type: string
    description: "The operation to perform: add, subtract, multiply, divide"
    required: true
    enum: [add, subtract, multiply, divide]
  a:
    type: number
    description: "First operand"
    required: true
  b:
    type: number
    description: "Second operand"
    required: true

execution:
  type: command
  command: "node"
  args: ["scripts/calculator.js", "{operation}", "{a}", "{b}"]

output_schema:
  type: object
  properties:
    result:
      type: number
      description: "Result of the operation"
    operation:
      type: string
    operands:
      type: object
      properties:
        a:
          type: number
        b:
          type: number

error_handling:
  retry: 2
  backoff_type: exponential
  initial_delay_ms: 500

examples:
  - parameters:
      operation: "add"
      a: 5
      b: 3
    result:
      result: 8

tags: [math, arithmetic, basic]
